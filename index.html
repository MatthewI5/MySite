
<html>
<head>
    <title>My Web Page</title>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div id="mobile-nav-container" class="navbar">
        <a href="/">Home</a>
        <a href="https://blog.matprojects.xyz">Blog</a>
        <a href="/gallery">Gallery</a>
    </div>
    <div id="top-nav-container">
        <div class="navbar" id="navbar-left">
            <a href="/">Home</a>
            
        </div>

        <div id="title-group">
            <div id="header">Matthew I</div>
            <div id="subheader">Hello World!</div>
        </div>

        <div class="navbar" id="navbar-right">
            <a href="https://blog.matprojects.xyz">Blog</a>
            <a href="/gallery">Gallery</a>
        </div>
    </div>
    

    
    <h1 class="center pad-top fade">Some Of My Projects</h1>

    <hr class="divider fade">
    
    <div id="tile-container">
        <div class="tile" style="--tile-image: url('https://picsum.photos/400/300');--fade-delay: 0.5s">
            <div class="text">
                <h2>Title</h2>
                <p>Test description and stuff can be big</p>
            </div>
        </div>
        <a class="tile clickable" style="--tile-image: url('/media/tiles/blog.webp');--fade-delay: 0.75s" href="https://blog.matprojects.xyz">
            <div class="text">
                <div class="tag" style="--tag-color-deg:210">writing</div>
                <h2>Blog</h2>
                <p>Writing about what I've learned and done</p>
                <div class="enter">See Posts<i class="fa-solid fa-arrow-right"></i></div>
            </div>
        </a>
        <a class="tile clickable" style="--tile-image: url('https://photos.matprojects.xyz/api/assets/8cd0f5c8-d007-4b91-9c57-dde68b147f5d/thumbnail?slug=website&size=preview&c=oPcJHYJYeHh%2Fhoh8d4d4lGaPZ%2FZ4&edited=true');--fade-delay: 1s" href="/gallery">
            <div class="text">
                <div class="tag" style="--tag-color-deg:90">photography</div>
                <h2>Gallery</h2>
                <p>Sharing my favourite photos I've taken</p>
                <div class="enter">See Posts<i class="fa-solid fa-arrow-right"></i></div>
            </div>
        </a>
    </div>
</body>
</html>
